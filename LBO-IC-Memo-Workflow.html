<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBO IC Memo Workflow</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div id="workflow" class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-4">LBO IC Memo Workflow</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Workflow Steps -->
            {[...Array(11)].map((_, index) => (
                <div key={index} class="p-4 border rounded-lg shadow-md bg-white">
                    <h2 class="text-xl font-semibold">Step {index + 1}</h2>
                    <p class="text-sm">Description of step {index + 1}.</p>
                    <div class="mt-2">
                        <span class={\`inline-block px-2 py-1 text-white text-xs font-semibold rounded-full \\${getColorClass(index)}\`}>\n                            Phase {getPhase(index)}\n                        </span>
                    </div>
                </div>
            ))}
        </div>
    </div>

    <script>
        const getColorClass = (index) => {
            switch(index) {
                case 0: return 'bg-green-500'; // Example color
                case 1: return 'bg-blue-500'; // Example color
                // Add more cases as needed for each step
                default: return 'bg-gray-500';
            }
        };

        const getPhase = (index) => {
            if (index < 3) return "Planning";
            if (index < 6) return "Execution";
            return "Closure";
        };

        ReactDOM.render(<div />, document.getElementById('workflow'));
    </script>
</body>
</html>
